name: Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './fakto/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./fakto
        run: npm ci
      
      - name: Generate Prisma Client
        working-directory: ./fakto
        run: npm run db:generate
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/fakto
      
      - name: Build application
        working-directory: ./fakto
        run: npm run build
        env:
          # Allow build to continue even if external resources fail
          NEXT_TELEMETRY_DISABLED: 1
          # Provide a mock DATABASE_URL for build time
          DATABASE_URL: postgresql://user:password@localhost:5432/fakto
