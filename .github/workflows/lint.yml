name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.x'
          cache: 'npm'
          cache-dependency-path: './fakto/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./fakto
        run: npm ci
      
      - name: Run ESLint
        working-directory: ./fakto
        run: npm run lint
